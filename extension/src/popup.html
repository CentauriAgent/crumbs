<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=340">
  <title>Crumbs</title>
  <style>
    :root {
      --bg: #1a1510;
      --surface: #251f18;
      --surface-hover: #2e2720;
      --gold: #D4A853;
      --gold-dim: #8B7355;
      --text: #E8DCC8;
      --text-muted: #8B7355;
      --border: #3a3228;
      --danger: #c0392b;
      --success: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      max-height: 520px;
      overflow-y: auto;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
    }
    .header .logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.5px;
    }
    .header .logo span { opacity: 0.5; }
    .header .settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .header .settings-btn:hover { color: var(--gold); }

    /* Page info */
    .page-info {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .page-info img {
      width: 20px;
      height: 20px;
      border-radius: 3px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .page-info .page-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      word-break: break-word;
      line-height: 1.3;
    }
    .page-info .page-url {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
      margin-top: 2px;
    }

    /* Count badge */
    .count-bar {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--gold-dim);
      border-bottom: 1px solid var(--border);
    }
    .count-bar .count { color: var(--gold); font-weight: 600; }

    /* Already saved state */
    .already-saved {
      padding: 14px;
      text-align: center;
    }
    .already-saved .check {
      font-size: 28px;
      margin-bottom: 6px;
    }
    .already-saved p {
      color: var(--text-muted);
      font-size: 12px;
    }
    .already-saved .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      margin-top: 8px;
    }
    .tag-pill {
      background: var(--surface);
      color: var(--gold);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
    }

    /* Form */
    .form {
      padding: 12px 14px;
    }
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--gold);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 48px;
    }

    /* Tag autocomplete */
    .tag-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .tag-suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag-suggestion:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Privacy toggle */
    .privacy-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .privacy-toggle .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .privacy-toggle .toggle.active {
      background: var(--gold);
      border-color: var(--gold);
    }
    .privacy-toggle .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      transition: transform 0.2s;
    }
    .privacy-toggle .toggle.active::after {
      transform: translateX(16px);
    }
    .privacy-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    .privacy-label .icon { margin-right: 3px; }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 10px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Footer link */
    .footer {
      padding: 8px 14px 12px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    .footer a {
      color: var(--gold-dim);
      text-decoration: none;
      font-size: 11px;
    }
    .footer a:hover { color: var(--gold); }

    /* States */
    .loading {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
    }
    .loading .dots::after {
      content: '· · ·';
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .error-msg {
      padding: 12px 14px;
      color: var(--danger);
      font-size: 12px;
      text-align: center;
    }

    .success-state {
      text-align: center;
      padding: 24px 14px;
    }
    .success-state .bread { font-size: 36px; }
    .success-state p {
      color: var(--gold);
      font-weight: 600;
      margin-top: 8px;
    }
    .success-state .sub {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 12px;
      margin-top: 4px;
    }

    .login-prompt {
      padding: 20px 14px;
      text-align: center;
    }
    .login-prompt p {
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .login-prompt .setup-btn {
      display: inline-block;
      padding: 8px 16px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🍞 Crumbs <span>· · ·</span></div>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <div id="content">
    <div class="loading">
      <div class="dots"></div>
      <p style="margin-top:8px">Finding crumbs…</p>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
